## Version 2025/05/31 - Changelog: https://github.com/linuxserver/docker-baseimage-alpine-nginx/commits/3.22/root/defaults/nginx/nginx.conf.sample

### Based on alpine defaults
# https://git.alpinelinux.org/aports/tree/main/nginx/nginx.conf?h=3.22-stable

user abc;

# Set number of worker processes automatically based on number of CPU cores.
include /config/nginx/worker_processes.conf;

# Enables the use of JIT for regular expressions to speed-up their processing.
pcre_jit on;

# Configures default error logger.
error_log /config/log/nginx/error.log;

# Includes files with directives to load dynamic modules.
include /etc/nginx/modules/*.conf;

# Include files with config snippets into the root context.
include /etc/nginx/conf.d/*.conf;

events {
	# The maximum number of simultaneous connections that can be opened by
	# a worker process.
	worker_connections 1024;
}

stream {
	upstream git_labmgm_org {
		server midori.tailce5c0d.ts.net:2424;
	}

	upstream minecraft_java_backend {
		server deimos.tail3a8092.ts.net:25565;
	}

	upstream minecraft_bedrock_backend {
		server deimos.tail3a8092.ts.net:19132;
	}
	
	upstream rlcraft_backend {
		server mf.tailaa9bf1.ts.net:25565;
	}

	# Atlas voice chat — LiveKit WebRTC media (UDP Mux + TCP fallback).
	# Both protocols ride a single port (7882) on this VPS. Traffic is
	# forwarded over Tailscale to the LiveKit container on keikaku, which
	# multiplexes all sessions onto its own :7882 listener (rtc.udp_port
	# / rtc.tcp_port in services/livekit/livekit.yaml). The VPS firewall
	# must allow UDP/TCP 7882 inbound for this to work.
	upstream atlas_livekit_media {
		server keikaku.tailce5c0d.ts.net:7882;
	}

	server {
		listen 2424;
		proxy_pass git_labmgm_org;
		proxy_timeout 10m;
		proxy_connect_timeout 5m;
	}

	server {
		listen 25565;
		proxy_pass minecraft_java_backend;
		proxy_timeout 10m;
		proxy_connect_timeout 5m;
	}

	server {
		listen 19132;
		proxy_pass minecraft_bedrock_backend;
		proxy_timeout 10m;
		proxy_connect_timeout 5m;
	}

	# LiveKit media UDP — single port carries every room's media via
	# UDP Mux. Long timeouts: a live call must not be cut by the proxy.
	server {
		listen 7882 udp;
		proxy_pass atlas_livekit_media;
		proxy_timeout 60m;
		proxy_responses 0; # streaming media — never close after N replies
	}

	# LiveKit media TCP fallback for clients on UDP-blocked networks.
	server {
		listen 7882;
		proxy_pass atlas_livekit_media;
		proxy_timeout 60m;
		proxy_connect_timeout 5s;
	}
}

http {
	# Includes mapping of file name extensions to MIME types of responses
	# and defines the default type.
	include /etc/nginx/mime.types;
	default_type application/octet-stream;

	# Name servers used to resolve names of upstream servers into addresses.
	# It's also needed when using tcpsocket and udpsocket in Lua modules.
	#resolver 1.1.1.1 1.0.0.1 2606:4700:4700::1111 2606:4700:4700::1001;
	include /config/nginx/resolver.conf;

	# Don't tell nginx version to the clients. Default is 'on'.
	server_tokens off;

	# Specifies the maximum accepted body size of a client request, as
	# indicated by the request header Content-Length. If the stated content
	# length is greater than this size, then the client receives the HTTP
	# error code 413. Set to 0 to disable. Default is '1m'.
	client_max_body_size 0;

	# Sendfile copies data between one FD and other from within the kernel,
	# which is more efficient than read() + write(). Default is off.
	sendfile on;

	# Causes nginx to attempt to send its HTTP response head in one packet,
	# instead of using partial frames. Default is 'off'.
	tcp_nopush on;

	# all ssl related config moved to ssl.conf
	# included in server blocks where listen 443 is defined

	# Enable gzipping of responses.
	gzip on;

	# Set the Vary HTTP header as defined in the RFC 2616. Default is 'off'.
	gzip_vary on;

	# Helper variable for proxying websockets.
	map $http_upgrade $connection_upgrade {
		default upgrade;
		'' close;
	}

	# Enable http2 by default for all servers
	http2 on;

	http3 on;
	quic_retry on;

	# Sets the path, format, and configuration for a buffered log write.
	access_log /config/log/nginx/access.log;

	client_body_temp_path /tmp/nginx 1 2;
	proxy_temp_path /tmp/nginx-proxy;
	fastcgi_temp_path /tmp/nginx-fastcgi;
	uwsgi_temp_path /tmp/nginx-uwsgi;
	scgi_temp_path /tmp/nginx-scgi;

	proxy_cache_path /tmp/nginx-proxy-cache keys_zone=lsio-proxy:10m;
	fastcgi_cache_path /tmp/nginx-fcgi-cache keys_zone=lsio-fcgi:10m;
	scgi_cache_path /tmp/nginx-scgi-cache keys_zone=lsio-scgi:10m;
	uwsgi_cache_path /tmp/nginx-uwsgi-cache keys_zone=lsio-uwsgi:10m;

	# Includes virtual hosts configs.
	include /etc/nginx/http.d/*.conf;
	include /config/nginx/site-confs/*.conf;

	# Custom error page
	#proxy_intercept_errors on;

	#error_page	404		/config/nginx/error.html;
	#error_page	500 502 503 504	/config/nginx/error.html;

	split_clients "${remote_addr}${request_uri}" $atr_backend_prod_pool {
		* http;
		* google_cloud_run;
	}

	map $atr_backend_prod_pool $atr_backend_prod_proxy_upstream {
		http http://atr_backend_prod_http;
		google_cloud_run https://atr_backend_prod_google_cloud_run;
	}

	map $atr_backend_prod_pool $atr_backend_prod_host_header {
		http $host;
		google_cloud_run atr-backend-744996511632.asia-southeast2.run.app;
	}

	map $atr_backend_prod_pool $atr_backend_prod_sni_name {
		http "";
		google_cloud_run atr-backend-744996511632.asia-southeast2.run.app;
	}

